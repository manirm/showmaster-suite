name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install Ubuntu specific libraries
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libnotify-dev libsdl2-dev freeglut3-dev libunwind-dev libgl1-mesa-dev libglu1-mesa-dev
        env:
          UV_EXTRA_INDEX_URL: https://extras.wxpython.org/wxPython/extras/7/linux/gtk3/ubuntu-22.04

      - name: Install dependencies
        run: uv sync --frozen --extra dev
        env:
          UV_EXTRA_INDEX_URL: https://extras.wxpython.org/wxPython/extras/7/linux/gtk3/ubuntu-22.04

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps chromium

      - name: Run unit tests (fast)
        run: uv run pytest tests/test_showmaster_core.py tests/test_cli.py -v --timeout=30

      - name: Run integration tests (browser)
        run: uv run pytest tests/test_browserpilot_core.py -v --timeout=60
