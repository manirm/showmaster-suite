name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install Ubuntu specific build libraries
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libnotify-dev libsdl2-dev freeglut3-dev

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps

      # macOS DMG creation handles everything in build.py via hdiutil, no need for brew install create-dmg

      - name: Build with Nuitka
        run: uv run scripts/build.py

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
            dist/*_bin.exe
            dist/*_bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
