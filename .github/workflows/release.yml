name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Install Ubuntu specific build libraries
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libwebkit2gtk-4.1-dev libgstreamer-gl1.0-0 freeglut3-dev libnotify-dev libsdl2-dev

      - name: Install dependencies
        run: uv sync

      - name: Install macOS specific build tools
        if: matrix.os == 'macos-latest'
        run: brew install create-dmg

      - name: Build with Nuitka
        run: uv run scripts/build.py

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/Showmaster*
            dist/BrowserPilot*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
