name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install Ubuntu specific build libraries
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libnotify-dev libsdl2-dev freeglut3-dev libunwind-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Install dependencies
        run: uv sync --frozen
        env:
          UV_EXTRA_INDEX_URL: https://extras.wxpython.org/wxPython/extras/7/linux/gtk3/ubuntu-22.04

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps

      - name: Build with Nuitka
        run: uv run python scripts/build.py

      - name: List build artifacts
        run: ls -R dist/

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*_bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
