name: Build, Sign, and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-22.04]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          version: "latest"

      - name: Install Ubuntu specific build libraries
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libnotify-dev libsdl2-dev freeglut3-dev libunwind-dev libgl1-mesa-dev libglu1-mesa-dev

      - name: Install dependencies
        run: uv sync --frozen --extra build
        env:
          UV_EXTRA_INDEX_URL: https://extras.wxpython.org/wxPython/extras/7/linux/gtk3/ubuntu-22.04

      - name: Install Playwright Browsers
        run: uv run playwright install --with-deps

      - name: Build with Nuitka
        run: uv run python scripts/build.py

      # ── macOS Code Signing & Notarization ─────────────────────────
      # Requires these GitHub Secrets:
      #   APPLE_CERTIFICATE_BASE64  - Base64-encoded .p12 Developer ID cert
      #   APPLE_CERTIFICATE_PASSWORD - Password for the .p12 file
      #   APPLE_TEAM_ID             - Apple Developer Team ID
      #   APPLE_ID                  - Apple ID email
      #   APPLE_APP_SPECIFIC_PASSWORD - App-specific password for notarytool
      - name: "macOS: Import signing certificate"
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          echo "$APPLE_CERTIFICATE_BASE64" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "" build.keychain
          rm certificate.p12

      - name: "macOS: Sign binaries"
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          find dist/ -name "*.app" -o -name "Showmaster*" -o -name "BrowserPilot*" | while read f; do
            codesign --deep --force --options runtime \
              --sign "Developer ID Application: $APPLE_TEAM_ID" "$f"
          done

      - name: "macOS: Notarize"
        if: matrix.os == 'macos-latest' && env.APPLE_CERTIFICATE_BASE64 != ''
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          # Create a ZIP for notarization
          for dmg in dist/*.dmg; do
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --wait --timeout 600
            xcrun stapler staple "$dmg"
          done

      # ── Windows Code Signing ──────────────────────────────────────
      # Requires these GitHub Secrets:
      #   WINDOWS_CERTIFICATE_BASE64 - Base64-encoded .pfx code signing cert
      #   WINDOWS_CERTIFICATE_PASSWORD - Password for the .pfx file
      - name: "Windows: Sign executables"
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE_BASE64 != ''
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        shell: powershell
        run: |
          $certBytes = [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64)
          [IO.File]::WriteAllBytes("certificate.pfx", $certBytes)
          
          Get-ChildItem -Path dist/ -Filter *.exe -Recurse | ForEach-Object {
            & "C:\Program Files (x86)\Windows Kits\10\bin\10.0.22621.0\x64\signtool.exe" sign `
              /f certificate.pfx `
              /p $env:WINDOWS_CERTIFICATE_PASSWORD `
              /tr http://timestamp.digicert.com `
              /td sha256 `
              /fd sha256 `
              $_.FullName
          }
          
          Remove-Item certificate.pfx

      # ── Linux GPG Signing ─────────────────────────────────────────
      - name: "Linux: GPG sign binary"
        if: matrix.os == 'ubuntu-22.04' && env.GPG_PRIVATE_KEY != ''
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
        run: |
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          find dist/ -name "*_bin" | while read f; do
            gpg --batch --detach-sign --armor "$f"
          done

      - name: List build artifacts
        run: ls -R dist/

      - name: Upload Artifacts
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            dist/*.dmg
            dist/*.exe
            dist/*_bin
            dist/*.asc
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

